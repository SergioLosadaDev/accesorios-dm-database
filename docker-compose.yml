services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-qa
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-qa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d accesorios_dm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    container_name: accesorios-dm-liquibase-qa
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/liquibase/changelog
    command: >
      sh -c "sleep 5 &&
             liquibase
             --url=jdbc:postgresql://postgres:5432/accesorios_dm_db
             --username=admin
             --password=admin123
             --changeLogFile=changelog-master.yaml
             update"
    networks:
      - accesorios-network-qa

volumes:
  postgres_qa_data:

networks:
  accesorios-network-qa:
    driver: bridge