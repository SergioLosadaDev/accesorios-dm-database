version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-qa
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-qa

volumes:
  postgres_qa_data:

networks:
  accesorios-network-qa:
    driver: bridge