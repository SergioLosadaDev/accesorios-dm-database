services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-dev
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d accesorios_dm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.25-alpine
    container_name: accesorios-dm-liquibase-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/liquibase/changelog
    working_dir: /liquibase/changelog
    command: >
      liquibase update
      --url=jdbc:postgresql://postgres:5434/accesorios_dm_db
      --username=admin
      --password=admin123
      --changelog-file=changelog-master.yaml
    networks:
      - accesorios-network-dev

volumes:
  postgres_dev_data:

networks:
  accesorios-network-dev:
    driver: bridge