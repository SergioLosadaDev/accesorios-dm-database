version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-dev

  liquibase:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    container_name: accesorios-dm-liquibase-dev
    depends_on:
      - postgres
    environment:
      LIQUIBASE_URL: jdbc:postgresql://postgres:5432/accesorios_dm_db
      LIQUIBASE_USERNAME: admin
      LIQUIBASE_PASSWORD: admin123
      LIQUIBASE_CHANGELOG: changelog-master.yaml
    volumes:
      - ./:/liquibase/changelog
    command: >
      sh -c "sleep 5 && 
             liquibase update"
    networks:
      - accesorios-network-dev

volumes:
  postgres_dev_data:

networks:
  accesorios-network-dev:
    driver: bridge