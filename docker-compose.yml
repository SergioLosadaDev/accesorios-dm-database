version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-prod
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-prod

volumes:
  postgres_prod_data:

networks:
  accesorios-network-prod:
    driver: bridge