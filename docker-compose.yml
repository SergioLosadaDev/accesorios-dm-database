services:
  postgres:
    image: postgres:16-alpine
    container_name: accesorios-dm-postgres-prod
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: accesorios_dm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - accesorios-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d accesorios_dm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    build:
      context: ./docker/liquibase
      dockerfile: Dockerfile
    container_name: accesorios-dm-liquibase-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_URL: jdbc:postgresql://postgres:5432/accesorios_dm_db
      LIQUIBASE_USERNAME: admin
      LIQUIBASE_PASSWORD: ${DB_PASSWORD}
      LIQUIBASE_CHANGELOG: changelog-master.yaml
    volumes:
      - ./:/liquibase/changelog
    command: liquibase update
    networks:
      - accesorios-network-prod

volumes:
  postgres_prod_data:

networks:
  accesorios-network-prod:
    driver: bridge